name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flask pytest

      - name: Compile Python files
        run: python -m py_compile app.py test_app.py

      - name: Run tests
        run: python -m pytest test_app.py -v

  build-macos:
    name: Build macOS app
    runs-on: macos-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flask pyinstaller

      - name: Build app bundle
        run: bash build_app_mac.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: scale-generator-macos-app
          path: dist/scale-generator.app

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flask pyinstaller

      - name: Build executable
        shell: cmd
        run: build_windows.bat

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: scale-generator-windows
          path: dist/scale-generator.exe
