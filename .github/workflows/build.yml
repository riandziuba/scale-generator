name: Build

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flask pytest

      - name: Compile Python files
        run: python -m py_compile app.py test_app.py

      - name: Run tests
        run: python -m pytest test_app.py -v

  build-macos:
    name: Build macOS app
    runs-on: macos-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flask pyinstaller

      - name: Build app bundle
        run: bash build_app_mac.sh

      - name: Upload app artifact
        run: |
          cd dist
          zip -r ../scale-generator-macos.zip scale-generator.app
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: scale-generator-macos-app
          path: scale-generator-macos.zip

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flask pyinstaller

      - name: Build executable
        shell: cmd
        run: build_windows.bat

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: scale-generator-windows
          path: dist/scale-generator.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: scale-generator-macos-app
          path: release

      - uses: actions/download-artifact@v4
        with:
          name: scale-generator-windows
          path: release

      - name: Inspect artifacts
        run: ls -lh release/

      - name: Publish Release
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          FILES="release/scale-generator-macos.zip release/scale-generator.exe"

          for f in $FILES; do
            if [ ! -f "$f" ]; then
              echo "ERROR: missing $f"
              exit 1
            fi
          done

          # If the release already exists (re-run), upload/clobber.
          # Otherwise create a new one.
          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            echo "Release $TAG exists — uploading assets"
            gh release edit "$TAG" --repo "$REPO" --draft=false
            gh release upload "$TAG" $FILES --repo "$REPO" --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" $FILES \
              --repo "$REPO" \
              --generate-notes \
              --verify-tag
          fi
        env:
          GH_TOKEN: ${{ github.token }}
